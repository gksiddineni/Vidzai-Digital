steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/ekyc-backend:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/ekyc-backend:$SHORT_SHA"
      - "."
      - "-f"
      - "Dockerfile"

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/ekyc-backend:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gke-deploy"
    args:
      - "run"
      - "--filename=."
      - "--image=gcr.io/$PROJECT_ID/ekyc-backend:$SHORT_SHA"
      - "--location=us-central1"

images:
  - "gcr.io/$PROJECT_ID/ekyc-backend:latest"
  - "gcr.io/$PROJECT_ID/ekyc-backend:$SHORT_SHA"

timeout: "1800s"
